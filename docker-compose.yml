# docker-compose.yml — local development and single-host production
#
# For production K8s deployment, use the Helm chart instead.
# This compose file uses SQLite (via a named volume). To switch to PostgreSQL,
# set DATABASE_URL and uncomment the postgres service below.

version: "3.9"

services:
  slackwoot:
    build: .
    ports:
      - "8000:8000"
    volumes:
      # Persist the SQLite database across container restarts
      - slackwoot_data:/app/data
    environment:
      # ── Required ───────────────────────────────────────────────────────────
      # Generate with: openssl rand -hex 32
      # Used to encrypt all sensitive config values stored in the database.
      # NEVER change this after initial setup — it will invalidate all stored credentials.
      SECRET_KEY: "changeme-generate-with-openssl-rand-hex-32"

      # ── Optional ───────────────────────────────────────────────────────────
      # DATABASE_URL defaults to sqlite+aiosqlite:///data/slackwoot.db
      # To use PostgreSQL:
      # DATABASE_URL: postgresql+asyncpg://slackwoot:password@postgres:5432/slackwoot

      LOG_LEVEL: INFO

      # All other settings (Chatwoot URL, Slack tokens, inbox mappings, etc.)
      # are configured through the web UI at http://localhost:8000/setup
      # on first run, and at http://localhost:8000/config thereafter.

    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  # Uncomment to use PostgreSQL instead of SQLite
  # postgres:
  #   image: postgres:16-alpine
  #   environment:
  #     POSTGRES_DB: slackwoot
  #     POSTGRES_USER: slackwoot
  #     POSTGRES_PASSWORD: changeme   # Use a Docker secret in production
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U slackwoot"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #   restart: unless-stopped

volumes:
  slackwoot_data:
  # postgres_data:   # Uncomment if using postgres service above
