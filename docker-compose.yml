# docker-compose.yml — local development and single-host production
#
# Configuration is loaded in this priority order (highest wins):
#   1. Shell environment variables  (export SECRET_KEY=xxx)
#   2. .env file                    (copy .env.example → .env and fill in)
#   3. Defaults defined below       (DATABASE_URL, LOG_LEVEL, PORT)
#
# Quick start:
#   cp .env.example .env
#   # edit .env and set SECRET_KEY
#   docker compose up -d
#
# For PostgreSQL instead of SQLite, set DATABASE_URL in .env and
# uncomment the postgres service at the bottom of this file.

services:
  slackwoot:
    build: .
    image: codebleu/slackwoot:latest
    container_name: slackwoot
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - slackwoot_data:/app/data
    env_file:
      - path: .env
        required: false
    environment:
      # ── Required ─────────────────────────────────────────────────────────
      # Must be set — no default. Generate with: openssl rand -hex 32
      # Used to encrypt all sensitive config values in the database.
      # NEVER change after initial setup — invalidates all stored credentials.
      - SECRET_KEY=${SECRET_KEY}

      # ── Optional — defaults shown ─────────────────────────────────────────
      - DATABASE_URL=${DATABASE_URL:-sqlite+aiosqlite:///data/slackwoot.db}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}

      # All other settings (Chatwoot URL, Slack tokens, inbox mappings, etc.)
      # are configured through the web UI at http://localhost:8000/setup
      # on first run, and at http://localhost:8000/config thereafter.

    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  # ── PostgreSQL (optional) ─────────────────────────────────────────────────
  # Uncomment this service and set DATABASE_URL in .env to use PostgreSQL.
  # postgres:
  #   image: postgres:16-alpine
  #   container_name: slackwoot_postgres
  #   environment:
  #     POSTGRES_DB: slackwoot
  #     POSTGRES_USER: slackwoot
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U slackwoot"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #   restart: unless-stopped

volumes:
  slackwoot_data:
  # postgres_data:   # Uncomment if using postgres service above
