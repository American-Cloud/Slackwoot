# SlackWoot Configuration
# Copy this to config.yaml and fill in your values.
# All values can also be set via environment variables.

# ── Chatwoot ─────────────────────────────────────────────────────────────────
chatwoot_base_url: "https://your-chatwoot.example.com"
chatwoot_api_token: "your-chatwoot-user-access-token"
chatwoot_account_id: 1
chatwoot_webhook_secret: ""   # Optional: set to validate webhook signatures

# ── Slack ─────────────────────────────────────────────────────────────────────
slack_bot_token: "xoxb-your-slack-bot-token"
slack_signing_secret: "your-slack-signing-secret"

# ── Inbox → Slack Channel Mappings ────────────────────────────────────────────
# Add one entry per Chatwoot inbox you want to bridge.
# slack_channel_id: Find this by right-clicking a channel in Slack → View channel details → scroll to bottom
inbox_mappings:
  - chatwoot_inbox_id: 4
    inbox_name: "Website Chat"
    slack_channel: "#support-website"
    slack_channel_id: "CAAAAAAAAAA"

  - chatwoot_inbox_id: 1
    inbox_name: "Email"
    slack_channel: "#support-email"
    slack_channel_id: "CBBBBBBBBBB"

  # Add more inboxes here:
  # - chatwoot_inbox_id: 7
  #   inbox_name: "Facebook"
  #   slack_channel: "#support-facebook"
  #   slack_channel_id: "CCCCCCCCCCC"

# ── App ───────────────────────────────────────────────────────────────────────
log_level: "INFO"
thread_store_path: "data/threads.json"
