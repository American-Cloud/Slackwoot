<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}SlackWoot{% endblock %}</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3250;
      --accent: #6c63ff;
      --accent2: #4fc3f7;
      --green: #4caf82;
      --yellow: #f0c060;
      --red: #e05c6a;
      --text: #e8eaf0;
      --muted: #8891b0;
      --radius: 10px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; align-items: center; gap: 2rem; height: 56px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 700; display: flex; align-items: center; gap: 0.5rem; text-decoration: none; color: var(--text); }
    .logo span { color: var(--accent); }
    nav a { color: var(--muted); text-decoration: none; font-size: 0.9rem; transition: color 0.2s; }
    nav a:hover { color: var(--text); }
    .nav-right { margin-left: auto; display: flex; gap: 1.5rem; align-items: center; }
    main { max-width: 1100px; margin: 0 auto; padding: 2rem; }
    h1 { font-size: 1.8rem; margin-bottom: 0.25rem; }
    .subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 2rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1.5rem; }
    .card h2 { font-size: 0.75rem; margin-bottom: 1rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .badge { display: inline-block; padding: 0.2em 0.6em; border-radius: 4px; font-size: 0.75rem; font-weight: 600; }
    .badge-green  { background: #1e3d2f; color: var(--green); }
    .badge-purple { background: #2a1f5e; color: #a98eff; }
    .badge-blue   { background: #1a2e3d; color: var(--accent2); }
    .badge-red    { background: #3d1a20; color: var(--red); }
    .badge-yellow { background: #3d2e0a; color: var(--yellow); }
    .badge-muted  { background: var(--surface2); color: var(--muted); }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th { text-align: left; padding: 0.6rem 1rem; color: var(--muted); font-size: 0.75rem; font-weight: 600; text-transform: uppercase; border-bottom: 1px solid var(--border); }
    td { padding: 0.8rem 1rem; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    code { background: var(--surface2); border: 1px solid var(--border); padding: 0.15em 0.4em; border-radius: 4px; font-family: monospace; font-size: 0.85em; }
    .url-box { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 0.75rem 1rem; font-family: monospace; font-size: 0.85rem; word-break: break-all; color: var(--accent2); }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); display: inline-block; }
    .dot-off { background: var(--muted); }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    .grid4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; }
    @media (max-width: 800px) { .grid2, .grid4 { grid-template-columns: 1fr; } }
    /* Stat tile */
    .stat-tile { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem 1.5rem; }
    .stat-tile .stat-value { font-size: 2rem; font-weight: 700; color: var(--text); line-height: 1; }
    .stat-tile .stat-label { font-size: 0.78rem; color: var(--muted); margin-top: 0.35rem; text-transform: uppercase; letter-spacing: 0.05em; }
    /* Buttons */
    .btn { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.4rem 0.9rem; border-radius: 6px; font-size: 0.82rem; font-weight: 600; cursor: pointer; border: none; transition: opacity 0.2s; text-decoration: none; }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-green   { background: #1e3d2f; color: var(--green); border: 1px solid #2d6647; }
    .btn-red     { background: #3d1a20; color: var(--red); border: 1px solid #6e2835; }
    .btn-yellow  { background: #3d2e0a; color: var(--yellow); border: 1px solid #6e5212; }
    .btn-muted   { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
    .btn-sm      { padding: 0.2rem 0.6rem; font-size: 0.78rem; }
    /* Forms */
    .form-group { margin-bottom: 1.25rem; }
    .form-group label { display: block; font-size: 0.82rem; color: var(--muted); margin-bottom: 0.4rem; font-weight: 500; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 0.55rem 0.75rem; font-size: 0.9rem; outline: none; transition: border-color 0.2s; }
    .form-group input:focus, .form-group select:focus { border-color: var(--accent); }
    .form-hint { font-size: 0.78rem; color: var(--muted); margin-top: 0.3rem; }
    /* Alerts */
    .alert { padding: 0.75rem 1rem; border-radius: 6px; font-size: 0.88rem; margin-bottom: 1.25rem; }
    .alert-error   { background: #3d1a20; border: 1px solid #6e2835; color: var(--red); }
    .alert-success { background: #1e3d2f; border: 1px solid #2d6647; color: var(--green); }
    /* Modal */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 200; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.75rem; width: min(520px, 95vw); max-height: 90vh; overflow-y: auto; }
    .modal h3 { font-size: 1rem; margin-bottom: 1.25rem; }
    .modal-footer { display: flex; gap: 0.75rem; justify-content: flex-end; margin-top: 1.5rem; }
    /* Pagination */
    .pagination { display: flex; gap: 0.5rem; align-items: center; font-size: 0.82rem; color: var(--muted); }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  {% block nav %}
  <nav>
    <a href="/" class="logo">⚡ Slack<span>Woot</span></a>
    <a href="/docs">API Docs</a>
    <a href="https://github.com/CodeBleu/slackwoot" target="_blank">GitHub</a>
    <div class="nav-right">
      <a href="/config">⚙ Config</a>
      <a href="/logout">Sign out</a>
    </div>
  </nav>
  {% endblock %}
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
