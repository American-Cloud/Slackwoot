<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}SlackWoot{% endblock %}</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3250;
      --accent: #6c63ff;
      --accent2: #4fc3f7;
      --green: #4caf82;
      --yellow: #f0c060;
      --red: #e05c6a;
      --text: #e8eaf0;
      --muted: #8891b0;
      --radius: 10px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      gap: 2rem;
      height: 56px;
    }
    .logo {
      font-size: 1.2rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
      color: var(--text);
    }
    .logo span { color: var(--accent); }
    nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.2s;
    }
    nav a:hover { color: var(--text); }
    main { max-width: 1100px; margin: 0 auto; padding: 2rem; }
    h1 { font-size: 1.8rem; margin-bottom: 0.25rem; }
    .subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 2rem; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .card h2 { font-size: 1rem; margin-bottom: 1rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; font-size: 0.75rem; }
    .badge {
      display: inline-block;
      padding: 0.2em 0.6em;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .badge-green { background: #1e3d2f; color: var(--green); }
    .badge-purple { background: #2a1f5e; color: #a98eff; }
    .badge-blue { background: #1a2e3d; color: var(--accent2); }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th { text-align: left; padding: 0.6rem 1rem; color: var(--muted); font-size: 0.75rem; font-weight: 600; text-transform: uppercase; border-bottom: 1px solid var(--border); }
    td { padding: 0.8rem 1rem; border-bottom: 1px solid var(--border); }
    tr:last-child td { border-bottom: none; }
    code {
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 0.15em 0.4em;
      border-radius: 4px;
      font-family: monospace;
      font-size: 0.85em;
    }
    .url-box {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.75rem 1rem;
      font-family: monospace;
      font-size: 0.85rem;
      word-break: break-all;
      color: var(--accent2);
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.78rem;
      padding: 0.2em 0.6em;
      border-radius: 20px;
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); display: inline-block; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    @media (max-width: 700px) { .grid2 { grid-template-columns: 1fr; } }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.4rem 0.9rem;
      border-radius: 6px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-red { background: #3d1a20; color: var(--red); border: 1px solid #6e2835; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <nav>
    <a href="/" class="logo">⚡ Slack<span>Woot</span></a>
    <a href="/admin">Dashboard</a>
    <a href="/docs">API Docs</a>
    <a href="https://github.com/your-org/slackwoot" target="_blank">GitHub</a>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
