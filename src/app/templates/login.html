{% extends "base.html" %}
{% block title %}SlackWoot — Sign In{% endblock %}

{% block nav %}{% endblock %}

{% block content %}
<div style="max-width:360px;margin:6rem auto;">
  <div style="text-align:center;margin-bottom:2rem;">
    <div style="font-size:2.5rem;margin-bottom:0.5rem;">⚡</div>
    <h1 style="font-size:1.4rem;">Slack<span style="color:var(--accent);">Woot</span></h1>
    <p style="color:var(--muted);font-size:0.88rem;margin-top:0.25rem;">Sign in to continue</p>
  </div>

  {% if error %}
  <div class="alert alert-error">{{ error }}</div>
  {% endif %}

  <div class="card">
    <form method="post" action="/login">
      <input type="hidden" name="next" value="{{ next }}"/>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" autofocus required placeholder="Admin password"/>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:0.65rem;">
        Sign In
      </button>
    </form>
  </div>
</div>
{% endblock %}
